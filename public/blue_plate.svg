<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="96" fill="#1e40af" stroke="#1e3a8a" stroke-width="3"/>
  <!-- Outer groove -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <!-- Main face -->
  <circle cx="100" cy="100" r="85" fill="#2563eb"/>
  <!-- Inner raised ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Inner face -->
  <circle cx="100" cy="100" r="65" fill="#2563eb"/>
  <!-- Inner groove -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
  <!-- Hub ring -->
  <circle cx="100" cy="100" r="30" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Center hole -->
  <circle cx="100" cy="100" r="14" fill="#0f172a" stroke="#1e3a8a" stroke-width="2"/>
  <!-- 9 o'clock: 20 KG -->
  <text x="55" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white" opacity="0.85">20</text>
  <text x="55" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="white" opacity="0.6">KG</text>
  <!-- 3 o'clock: 45 LB -->
  <text x="145" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white" opacity="0.85">45</text>
  <text x="145" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" fill="white" opacity="0.6">LB</text>
</svg>
