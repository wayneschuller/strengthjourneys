<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="96" fill="#1e40af" stroke="#1e3a8a" stroke-width="3"/>
  <!-- Outer groove -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <!-- Main face -->
  <circle cx="100" cy="100" r="85" fill="#2563eb"/>
  <!-- Inner raised ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Inner face -->
  <circle cx="100" cy="100" r="65" fill="#2563eb"/>
  <!-- Inner groove -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
  <!-- Hub ring -->
  <circle cx="100" cy="100" r="30" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Center hole -->
  <circle cx="100" cy="100" r="14" fill="#0f172a" stroke="#1e3a8a" stroke-width="2"/>
  <!-- Weight text -->
  <text x="100" y="80" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.95">20</text>
  <text x="100" y="93" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="white" opacity="0.7">KG</text>
  <!-- Bottom text -->
  <text x="100" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="white" opacity="0.5">45 LB</text>
</svg>
