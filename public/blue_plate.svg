<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="96" fill="#1e40af" stroke="#1e3a8a" stroke-width="3"/>
  <!-- Outer groove -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <!-- Main face -->
  <circle cx="100" cy="100" r="85" fill="#2563eb"/>
  <!-- Inner raised ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Inner face -->
  <circle cx="100" cy="100" r="65" fill="#2563eb"/>
  <!-- Inner groove -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.4"/>
  <!-- Steel hub insert -->
  <circle cx="100" cy="100" r="30" fill="#b0b8c8" stroke="#8a919e" stroke-width="1.5"/>
  <!-- Steel hub shading — subtle radial gradient -->
  <radialGradient id="steelGrad" cx="45%" cy="40%">
    <stop offset="0%" stop-color="#d4d8e0"/>
    <stop offset="60%" stop-color="#a0a8b8"/>
    <stop offset="100%" stop-color="#787e8c"/>
  </radialGradient>
  <circle cx="100" cy="100" r="29" fill="url(#steelGrad)"/>
  <!-- Brushed steel ring lines -->
  <circle cx="100" cy="100" r="26" fill="none" stroke="#c0c6d0" stroke-width="0.5" opacity="0.5"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#c0c6d0" stroke-width="0.4" opacity="0.35"/>
  <circle cx="100" cy="100" r="18" fill="none" stroke="#c0c6d0" stroke-width="0.3" opacity="0.25"/>
  <!-- Center hole -->
  <circle cx="100" cy="100" r="13" fill="#2a2e38" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Hole inner bevel -->
  <circle cx="100" cy="100" r="11.5" fill="none" stroke="#4b5060" stroke-width="0.8" opacity="0.6"/>
  <!-- 9 o'clock: 20 KG -->
  <text x="38" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="white" opacity="0.9">20</text>
  <text x="38" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="white" opacity="0.65">KG</text>
  <!-- 3 o'clock: 45 LB -->
  <text x="162" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="bold" fill="white" opacity="0.9">45</text>
  <text x="162" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="white" opacity="0.65">LB</text>
</svg>
